[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "specialized-intelligence"
version = "0.0.1"
description = "License-clean, world-model-useful video data flywheel."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "pre-commit>=3.7",
    "detect-secrets>=1.5",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["components*"]
exclude = ["tests*", "docs*", "scripts*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-q --strict-markers"
markers = [
    "e2e: end-to-end tests that may require ffmpeg",
]
