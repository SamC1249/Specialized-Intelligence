name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy, best-effort)
        run: mypy src || true

      - name: Tests (offline)
        env:
          SPECINT_RUN_INTEGRATION: "0"
        run: pytest -q --cov=specint --cov-report=term-missing

      - name: E2E compare (fixtures)
        run: |
          python -m specint compare --fixtures --terms cooking recipe \
            --output reports/ci-compare.json
          test -s reports/ci-compare.json

      - name: E2E ablation (fixtures)
        run: |
          python -m specint ablate --fixtures --terms cooking recipe \
            --output reports/ci-ablation.json
          test -s reports/ci-ablation.json

      - name: Pipeline dry run (fixtures, determinism)
        run: |
          python scripts/pipeline_dry_run.py \
            --fixtures tests/fixtures \
            --manifest data/manifests/dry-run-ci.jsonl \
            --report reports/dry-run-ci.json
          python scripts/manifest_lint.py data/manifests/

      - name: Forbid YouTube URLs (repo-wide)
        run: python scripts/precommit_forbid_youtube.py

      - name: Upload comparison report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: compare-report
          path: |
            reports/ci-compare.json
            reports/ci-ablation.json
            reports/dry-run-ci.json
            data/manifests/dry-run-ci.jsonl

  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
