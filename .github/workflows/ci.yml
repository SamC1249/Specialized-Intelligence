name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint + type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests scripts
      - name: Ruff (format check)
        run: ruff format --check src tests scripts
      - name: Pyright
        run: pyright

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest unit
        run: pytest tests/unit --cov=specialized_intelligence --cov-report=term-missing

  e2e:
    name: e2e tiny corpus
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest e2e (fast slice only)
        run: pytest tests/e2e -m "not slow"

  docs-sync:
    name: docs sync (AGENTS.md / db_structured.md / plan.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check required docs exist
        run: python scripts/check_docs_sync.py
      - name: License audit (manifest mode)
        run: python scripts/audit_licenses.py --dry-run
