name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy, best-effort)
        run: mypy src || true

      - name: Tests (offline)
        env:
          SPECINT_RUN_INTEGRATION: "0"
        run: pytest -q --cov=specint --cov-report=term-missing

      - name: E2E compare (fixtures)
        run: |
          python -m specint compare --fixtures --terms cooking recipe \
            --output reports/ci-compare.json
          test -s reports/ci-compare.json

      - name: Upload comparison report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: compare-report
          path: reports/ci-compare.json

  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
